name: Bug Report
description: Report something that's broken
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly and concisely.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start TerminalX with `./start.sh`
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - Docker
        - npm (from source)
        - start.sh
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / Platform
      placeholder: "Ubuntu 22.04 / macOS 14 / etc."
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v20.x"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output or server logs.
      render: shell
